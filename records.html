<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Records</title>
<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid white;
    padding:10px;
}
th{
    background:#2563eb;
}
</style>
</head>
<body>

<h2>Login History</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>

<script>
const records = JSON.parse(localStorage.getItem("loginRecords")) || [];
const tbody = document.getElementById("records");

records.forEach(record=>{
    tbody.innerHTML += `
    <tr>
        <td>${record.name}</td>
        <td>${record.date}</td>
        <td>${record.time}</td>
    </tr>`;
});
</script>

</body>
</html>
